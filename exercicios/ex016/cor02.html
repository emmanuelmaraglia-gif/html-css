<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>

    <style>
        * { /* configurações globais dos CSS */
            height: 100%;
        }
        body { /* linear-gradient e radial-gradient são tipos principais de degradê para se usar */
            background-image: radial-gradient(circle, #F20587, #960CF2, #F25D07, #FFFFFF, #FD01BC);
           background-attachment: fixed;
        }
    </style>

</head>
<body>
    
    <h1>Testando Gradiente</h1>

</body>
</html>
